<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz System</title>

<style>
body{font-family:Arial;background:#0f2027;color:#fff;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#203a43;padding:20px;border-radius:10px;margin-top:20px}
input{padding:10px;margin:5px;width:100%}
button{padding:10px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.option{background:#444;padding:10px;margin:5px 0;border-radius:5px;cursor:pointer}
.selected{background:#888}
.hidden{display:none}
</style>

</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
<h2>🔐 Login</h2>
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password" type="password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">
<h2>🏠 Dashboard</h2>
<button onclick="startQuiz()">Start Quiz</button>
<button onclick="viewResults()">View Results</button>
<button onclick="logout()">Logout</button>
<div id="resultList"></div>
</div>

<!-- QUIZ -->
<div id="quizPage" class="card hidden">
<h2>Quiz</h2>
<div id="quiz"></div>
<button onclick="submitQuiz()">Submit</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="card hidden">
<h2>Result</h2>
<h3 id="score"></h3>
<button onclick="goDashboard()">Back to Dashboard</button>
</div>

</div>

<script>

// fake users (real login simulation)
const users = [
  {username:"admin",password:"1234"},
  {username:"student",password:"1234"}
];

let currentUser=null;

// login
function login(){
 let u=document.getElementById("user").value;
 let p=document.getElementById("pass").value;

 let found=users.find(x=>x.username===u && x.password===p);

 if(found){
   currentUser=u;
   document.getElementById("loginPage").classList.add("hidden");
   document.getElementById("dashboard").classList.remove("hidden");
 }else{
   alert("Invalid login");
 }
}

// logout
function logout(){
 location.reload();
}

// questions
const questions=[
{q:"HTML stands for?",options:["Hyper Text Markup Language","Wrong","Wrong","Wrong"],answer:0},
{q:"CSS used for?",options:["Logic","Styling","DB","Backend"],answer:1},
{q:"JS runs in?",options:["Browser","DB","OS","None"],answer:0}
];

let answers=[];

// start quiz
function startQuiz(){
 document.getElementById("dashboard").classList.add("hidden");
 document.getElementById("quizPage").classList.remove("hidden");

 let html="";
 questions.forEach((q,i)=>{
  html+=`<p>${i+1}. ${q.q}</p>`;
  q.options.forEach((opt,j)=>{
    html+=`<div class="option" onclick="select(${i},${j})">${opt}</div>`;
  });
 });

 document.getElementById("quiz").innerHTML=html;
}

// select
function select(q,o){
 answers[q]=o;
}

// submit
function submitQuiz(){
 let score=0;
 questions.forEach((q,i)=>{
  if(answers[i]==q.answer) score++;
 });

 // save result locally
 let results=JSON.parse(localStorage.getItem("results"))||[];
 results.push({user:currentUser,score});
 localStorage.setItem("results",JSON.stringify(results));

 document.getElementById("quizPage").classList.add("hidden");
 document.getElementById("resultPage").classList.remove("hidden");

 document.getElementById("score").innerText=`Score: ${score}`;
}

// dashboard result view
function viewResults(){
 let results=JSON.parse(localStorage.getItem("results"))||[];
 let html="<h3>📊 Results</h3>";

 results.forEach(r=>{
  html+=`<p>${r.user} → ${r.score}</p>`;
 });

 document.getElementById("resultList").innerHTML=html;
}

// back
function goDashboard(){
 document.getElementById("resultPage").classList.add("hidden");
 document.getElementById("dashboard").classList.remove("hidden");
}

</script>

</body>
</html>
