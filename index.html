<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Dashboard</title>

<style>
:root{
  --bg1:#0f2027;
  --bg2:#203a43;
  --bg3:#2c5364;
  --card:rgba(255,255,255,0.08);
  --text:#fff;
}

body.light{
  --bg1:#e0eafc;
  --bg2:#cfdef3;
  --bg3:#e0eafc;
  --card:rgba(255,255,255,0.7);
  --text:#111;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:var(--text);
  transition:0.5s;
}

.container{
  width:100%;
  max-width:450px;
  padding:20px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  transition:0.5s;
}

/* INPUTS */
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.secondary{
  background:rgba(255,255,255,0.25);
}

/* HEADER */
h2{
  text-align:center;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.toggleMode{
  cursor:pointer;
  font-size:14px;
  padding:5px 10px;
  border-radius:8px;
  background:rgba(255,255,255,0.2);
}

/* DASHBOARD */
.dashboard{
  display:none;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.stat{
  background:rgba(255,255,255,0.1);
  padding:12px;
  border-radius:15px;
  text-align:center;
}

/* CHART */
canvas{
  margin-top:15px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  padding:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginBox">
    <h2>🔐 Premium Login</h2>

    <input placeholder="Enter Email">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button class="secondary">Register</button>

    <div class="footer">✨ Secure System</div>
  </div>

  <!-- DASHBOARD -->
  <div class="card dashboard" id="dashboard">

    <div class="topbar">
      <h3>📊 Dashboard</h3>
      <div class="toggleMode" onclick="toggleTheme()">🌙 / ☀️</div>
    </div>

    <p>Welcome Back 👋</p>

    <div class="cards">
      <div class="stat">Users<br><b>120</b></div>
      <div class="stat">Projects<br><b>45</b></div>
      <div class="stat">Sales<br><b>89%</b></div>
      <div class="stat">Messages<br><b>12</b></div>
    </div>

    <!-- CHART -->
    <canvas id="chart" width="350" height="180"></canvas>

    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
function login(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
  drawChart();
}

function logout(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

/* DARK / LIGHT TOGGLE */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ANIMATED CHART */
function drawChart(){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  let data = [30, 60, 40, 80, 50, 90];
  let i = 0;

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let j=0;j<=i;j++){
      ctx.fillStyle="#00c6ff";
      ctx.fillRect(j*50+20, 150-data[j], 30, data[j]);
    }

    if(i < data.length){
      i++;
      requestAnimationFrame(animate);
    }
  }

  animate();
}
</script>

</body>
</html>
