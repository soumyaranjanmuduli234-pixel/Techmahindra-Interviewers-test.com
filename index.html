<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz System Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  color:#fff;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#203a43;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.option{
  background:#444;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  cursor:pointer;
}

.selected{background:#888}
.hidden{display:none}

h2{text-align:center}
</style>

</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
<h2>🔐 Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="showRegister()">Register</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="card hidden">
<h2>📝 Register</h2>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>
<button onclick="backToLogin()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">
<h2>🏠 Dashboard</h2>

<button onclick="startQuiz()">Start Quiz</button>
<button onclick="viewResults()">View Results</button>
<button onclick="openAdmin()">Admin Panel 🔐</button>
<button onclick="logout()">Logout</button>

<div id="resultList"></div>
</div>

<!-- QUIZ -->
<div id="quizPage" class="card hidden">
<h2>Quiz</h2>
<div id="quiz"></div>
<button onclick="submitQuiz()">Submit</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="card hidden">
<h2>Result</h2>
<h3 id="score"></h3>
<button onclick="goDashboard()">Back</button>
</div>

<!-- ADMIN -->
<div id="adminPage" class="card hidden">
<h2>👨‍💻 Admin Panel</h2>

<input id="q" placeholder="Question">
<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="o3" placeholder="Option 3">
<input id="o4" placeholder="Option 4">
<input id="ans" placeholder="Answer index (0-3)">

<button onclick="addQuestion()">Add Question</button>

<div id="adminQuestions"></div>

<button onclick="closeAdmin()">Close</button>
</div>

</div>

<script>

// USERS STORAGE
let users = JSON.parse(localStorage.getItem("users")) || [];

// QUESTIONS
let questions = JSON.parse(localStorage.getItem("questions")) || [
{q:"HTML stands for?",options:["Hyper Text Markup Language","Wrong","Wrong","Wrong"],answer:0}
];

let currentUser=null;
let answers=[];

// LOGIN
function login(){
 let u=loginUser.value;
 let p=loginPass.value;

 let found=users.find(x=>x.u===u && x.p===p);

 if(found){
  currentUser=u;
  loginPage.classList.add("hidden");
  dashboard.classList.remove("hidden");
 } else alert("Invalid login");
}

// REGISTER
function register(){
 let u=regUser.value;
 let p=regPass.value;

 users.push({u,p});
 localStorage.setItem("users",JSON.stringify(users));

 alert("Registered!");
 backToLogin();
}

function showRegister(){
 loginPage.classList.add("hidden");
 registerPage.classList.remove("hidden");
}

function backToLogin(){
 registerPage.classList.add("hidden");
 loginPage.classList.remove("hidden");
}

// LOGOUT
function logout(){ location.reload(); }

// QUIZ
function startQuiz(){
 dashboard.classList.add("hidden");
 quizPage.classList.remove("hidden");

 let html="";
 questions.forEach((q,i)=>{
  html+=`<p>${i+1}. ${q.q}</p>`;
  q.options.forEach((opt,j)=>{
    html+=`<div class="option" onclick="select(${i},${j},this)">${opt}</div>`;
  });
 });

 quiz.innerHTML=html;
}

function select(q,o,el){
 answers[q]=o;
 let opts=el.parentNode.querySelectorAll(".option");
 opts.forEach(x=>x.classList.remove("selected"));
 el.classList.add("selected");
}

// SUBMIT
function submitQuiz(){
 let score=0;
 questions.forEach((q,i)=>{
  if(answers[i]==q.answer) score++;
 });

 let results=JSON.parse(localStorage.getItem("results"))||[];
 results.push({user:currentUser,score});
 localStorage.setItem("results",JSON.stringify(results));

 quizPage.classList.add("hidden");
 resultPage.classList.remove("hidden");
 score.innerText=`Score: ${score}`;
}

// RESULTS
function viewResults(){
 let results=JSON.parse(localStorage.getItem("results"))||[];
 let html="<h3>Results</h3>";

 results.forEach(r=>{
  html+=`<p>${r.user} → ${r.score}</p>`;
 });

 resultList.innerHTML=html;
}

// ADMIN
function openAdmin(){
 let pass=prompt("Enter Admin Password");
 if(pass==="Soumya@7890"){
  adminPage.classList.remove("hidden");
  loadAdmin();
 } else alert("Wrong password");
}

function closeAdmin(){
 adminPage.classList.add("hidden");
}

function addQuestion(){
 let newQ={
  q:q.value,
  options:[o1.value,o2.value,o3.value,o4.value],
  answer:parseInt(ans.value)
 };

 questions.push(newQ);
 localStorage.setItem("questions",JSON.stringify(questions));
 loadAdmin();
}

function loadAdmin(){
 let html="";
 questions.forEach((q,i)=>{
  html+=`<p>${q.q} <button onclick="del(${i})">❌</button></p>`;
 });
 adminQuestions.innerHTML=html;
}

function del(i){
 questions.splice(i,1);
 localStorage.setItem("questions",JSON.stringify(questions));
 loadAdmin();
}

// BACK
function goDashboard(){
 resultPage.classList.add("hidden");
 dashboard.classList.remove("hidden");
}

</script>

</body>
</html>
