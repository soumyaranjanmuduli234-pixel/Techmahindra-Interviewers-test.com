<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz + Admin</title>

<style>
body{font-family:Arial;background:#0f2027;color:#fff;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
.option{background:#444;margin:5px 0;padding:10px;border-radius:5px;cursor:pointer}
.selected{background:#888}
button{margin:5px;padding:10px;border:none;border-radius:5px;cursor:pointer}
.hidden{display:none}
.card{background:#203a43;padding:20px;border-radius:10px;margin-bottom:20px}
</style>
</head>

<body>

<div class="container">

<!-- QUIZ -->
<div id="quizPage" class="card">
<h2>Quiz</h2>
<input id="username" placeholder="Enter your name">

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit</button>
<button onclick="openAdmin()">Admin</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="card hidden">
<h2>Result</h2>
<h3 id="score"></h3>
<button onclick="location.reload()">Restart</button>
</div>

<!-- ADMIN -->
<div id="adminPage" class="card hidden">
<h2>Admin Panel 🔐</h2>

<h3>Add Question</h3>
<input id="q" placeholder="Question"><br>
<input id="o1" placeholder="Option1"><br>
<input id="o2" placeholder="Option2"><br>
<input id="o3" placeholder="Option3"><br>
<input id="o4" placeholder="Option4"><br>
<input id="ans" placeholder="Correct index (0-3)"><br>
<button onclick="addQuestion()">Add</button>

<h3>Questions</h3>
<div id="adminQuestions"></div>

<h3>Student Results</h3>
<div id="results"></div>

<button onclick="closeAdmin()">Close</button>
</div>

</div>

<script>

// default questions
let questions = JSON.parse(localStorage.getItem("questions")) || [
{q:"HTML stands for?",options:["Hyper Text Markup Language","Wrong","Wrong","Wrong"],answer:0}
];

let answers=[];

// render quiz
function loadQuiz(){
 let html="";
 questions.forEach((q,i)=>{
  html+=`<p>${i+1}. ${q.q}</p>`;
  q.options.forEach((opt,j)=>{
    html+=`<div class="option" onclick="select(${i},${j})">${opt}</div>`;
  });
 });
 document.getElementById("quiz").innerHTML=html;
}
loadQuiz();

function select(q,o){
 answers[q]=o;
 loadQuiz();
}

// submit
function submitQuiz(){
 let name=document.getElementById("username").value;
 let score=0;

 questions.forEach((q,i)=>{
  if(answers[i]==q.answer) score++;
 });

 // save result
 let results=JSON.parse(localStorage.getItem("results"))||[];
 results.push({name,score});
 localStorage.setItem("results",JSON.stringify(results));

 document.getElementById("quizPage").classList.add("hidden");
 document.getElementById("resultPage").classList.remove("hidden");
 document.getElementById("score").innerText=`${name} Score: ${score}`;
}

// ADMIN LOGIN
function openAdmin(){
 let pass=prompt("Enter Password");
 if(pass==="Soumya@7890"){
   document.getElementById("adminPage").classList.remove("hidden");
   loadAdmin();
 } else {
   alert("Wrong password");
 }
}

function closeAdmin(){
 document.getElementById("adminPage").classList.add("hidden");
}

// add question
function addQuestion(){
 let q=document.getElementById("q").value;
 let options=[
  document.getElementById("o1").value,
  document.getElementById("o2").value,
  document.getElementById("o3").value,
  document.getElementById("o4").value
 ];
 let answer=parseInt(document.getElementById("ans").value);

 questions.push({q,options,answer});
 localStorage.setItem("questions",JSON.stringify(questions));
 loadAdmin();
}

// admin list
function loadAdmin(){
 let qhtml="";
 questions.forEach((q,i)=>{
  qhtml+=`<p>${q.q} <button onclick="deleteQ(${i})">❌</button></p>`;
 });
 document.getElementById("adminQuestions").innerHTML=qhtml;

 let results=JSON.parse(localStorage.getItem("results"))||[];
 let rhtml="";
 results.forEach(r=>{
  rhtml+=`<p>${r.name} → ${r.score}</p>`;
 });
 document.getElementById("results").innerHTML=rhtml;
}

// delete
function deleteQ(i){
 questions.splice(i,1);
 localStorage.setItem("questions",JSON.stringify(questions));
 loadAdmin();
}

</script>

</body>
</html>
